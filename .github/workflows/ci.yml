name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint é não-bloqueante: reporta os problemas (anotações do GitHub) mas não
      # derruba o job, para que type-check/build/test voltem a ser exercitados.
      # Os ~71 erros de lint são tratados em card à parte.
      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  edge:
    # Type-check e testes das Edge Functions (Deno) — não cobertas pelo tsc do front.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check chat-orchestrator
        run: deno check supabase/functions/chat-orchestrator/index.ts

      - name: Type-check ocr-attachment
        run: deno check supabase/functions/ocr-attachment/index.ts

      - name: Type-check attendance-summary
        run: deno check supabase/functions/attendance-summary/index.ts

      - name: Test chat-orchestrator (tools + intent classifier)
        run: deno test supabase/functions/chat-orchestrator/

      - name: Test _shared/ocr (extrator + registry + merge)
        run: deno test supabase/functions/_shared/ocr/

      - name: Test attendance-summary (deno)
        run: deno test supabase/functions/attendance-summary/
