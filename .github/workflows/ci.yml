name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Gate de merge: tsc + build + testes. O lint foi MOVIDO para um job próprio
    # (não-bloqueante) — antes rodava aqui como 1º passo e, com ~71 erros de lint
    # pré-existentes, falhava e impedia tsc/build/test de rodarem (CI cego a
    # regressões reais). Agora este job exercita de fato o build e os testes.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  lint:
    # INFORMATIVO (não bloqueia o merge). Há dívida de lint pré-existente
    # (~71 erros em ImportarDados.tsx, integrationApi.ts, mechanicalValidator.ts,
    # index.ts). continue-on-error mantém o lint visível sem travar o gate;
    # zerar a dívida é um card à parte.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # continue-on-error no PASSO: o job fica verde sob qualquer configuração de
      # branch protection (não bloqueia o merge), mas os erros de lint continuam
      # visíveis no log/anotações do passo.
      - name: Lint (informativo — não bloqueia)
        run: bun run lint
        continue-on-error: true

  edge:
    # Type-check e testes das Edge Functions (Deno) — não cobertas pelo tsc do front.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check chat-orchestrator
        run: deno check supabase/functions/chat-orchestrator/index.ts

      - name: Type-check ocr-attachment
        run: deno check supabase/functions/ocr-attachment/index.ts

      - name: Test chat-orchestrator (tools + intent classifier)
        run: deno test supabase/functions/chat-orchestrator/

      - name: Test _shared/ocr (extrator + registry + merge)
        run: deno test supabase/functions/_shared/ocr/
