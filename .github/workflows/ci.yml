name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  edge:
    # Type-check e testes das Edge Functions (Deno) — não cobertas pelo tsc do front.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check chat-orchestrator
        run: deno check supabase/functions/chat-orchestrator/index.ts

      - name: Type-check ocr-attachment
        run: deno check supabase/functions/ocr-attachment/index.ts

      - name: Test chat-orchestrator (tools + intent classifier)
        run: deno test supabase/functions/chat-orchestrator/
