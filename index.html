    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LexForce",
      "applicationCategory": "BusinessApplication",
      "description": "Força de trabalho de IA jurídica com 91+ agentes que executam tarefas operacionais para advogados.",
      "offers": { "@type": "Offer", "price": "297", "priceCurrency": "BRL" },
      "operatingSystem": "Web"
    }
    </script>
    <!-- Apply persisted theme before paint to avoid flash on every route. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("jc-theme");
          var theme = saved === "dark" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
