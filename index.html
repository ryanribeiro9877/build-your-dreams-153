<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Impede que tradutores de navegador (Google Tradutor etc.) mutem o DOM
         controlado pelo React. Sem isto, o tradutor troca text nodes por <font>
         e o React quebra com "NotFoundError: removeChild ... not a child" ao
         re-renderizar (ex.: etapa de endereço do cadastro de cliente). -->
    <meta name="google" content="notranslate" />
    <title>JurisAI — Seus agentes trabalham. Você decide.</title>
    <meta name="description" content="JurisAI: força de trabalho de IA jurídica com 91+ agentes que protocolam, redigem, calculam e monitoram prazos por você. Você comanda. Eles executam. Conformidade LGPD e OAB.">
    <meta name="author" content="JurisAI" />
    <meta name="keywords" content="JurisAI, IA jurídica, advocacia, agentes IA, automação jurídica, escritório de advocacia, peticionamento, cálculos trabalhistas, LGPD, OAB" />
    <link rel="canonical" href="https://lexforce.app/" />
    <meta name="theme-color" content="#060610" />
    <!-- Favicon: logo JurisAI (substitui o icone padrao da Lovable) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=League+Spartan:wght@800&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JurisAI" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="JurisAI — Seus agentes trabalham. Você decide." />
    <meta property="og:description" content="Uma força de IA jurídica de 91+ agentes que executa por você. Pare de fazer. Comece a comandar — com segurança LGPD e aprovação humana em toda decisão." />
    <meta property="og:image" content="/og-jurisai.jpg" />
    <meta property="og:image:width" content="1216" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="JurisAI — silhueta humana coroada com agentes de IA orbitando ao redor" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JurisAI — Seus agentes trabalham. Você decide." />
    <meta name="twitter:description" content="91+ agentes de IA jurídica trabalhando 24/7 por você. Você comanda. Eles executam." />
    <meta name="twitter:image" content="/og-jurisai.jpg" />
    <meta name="twitter:image:alt" content="JurisAI — sua força de trabalho de IA jurídica" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "JurisAI",
      "applicationCategory": "BusinessApplication",
      "description": "Força de trabalho de IA jurídica com 91+ agentes que executam tarefas operacionais para advogados.",
      "offers": { "@type": "Offer", "price": "297", "priceCurrency": "BRL" },
      "operatingSystem": "Web"
    }
    </script>
    <!-- Apply persisted theme before paint to avoid flash on every route. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("jc-theme");
          var theme = saved === "dark" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>

  <body>
    <!-- notranslate: reforço no container raiz do React (a tradução é ignorada
         no elemento e em toda a sua descendência). Ver <meta google notranslate>. -->
    <div id="root" class="notranslate"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
